<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--c-bg); color: var(--c-ink); padding: 22px 26px; }
  .row { display: flex; align-items: baseline; gap: 16px; padding: 5px 0; }
  .name { font-family: var(--ff-mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--c-ink-mute); width: 64px; flex: 0 0 auto; }
  .spec { font-family: var(--ff-display); font-weight: 700; letter-spacing: -0.025em; line-height: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
</style>
</head>
<body>
  <div class="row"><span class="name">h1</span><span class="spec" style="font-size:var(--fs-h1); font-weight:800;">Sovereign</span></div>
  <div class="row"><span class="name">h2</span><span class="spec" style="font-size:var(--fs-h2); font-weight:800;">Capabilities</span></div>
  <div class="row"><span class="name">h3</span><span class="spec" style="font-size:var(--fs-h3);">Old wisdom</span></div>
  <div class="row"><span class="name">h4</span><span class="spec" style="font-size:var(--fs-h4);">Data Architecture</span></div>
  <div class="row"><span class="name">lede</span><span class="spec" style="font-size:var(--fs-lede); font-weight:400; color:var(--c-ink-sub);">A deliberately small set of tools</span></div>
  <div class="row"><span class="name">body</span><span class="spec" style="font-size:var(--fs-body); font-weight:400; color:var(--c-ink-sub);">Operating 24 / 7 / 365 on sovereign infrastructure</span></div>
</body>
</html>
