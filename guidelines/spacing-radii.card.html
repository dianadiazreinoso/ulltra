<!-- @dsCard group="Spacing" viewport="700x180" name="Radii & elevation" subtitle="Restrained rounding · deep soft shadows" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--c-bg); padding: 24px 26px; font-family: var(--ff-mono); display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
  .box { width: 84px; height: 84px; background: var(--c-bg-2); border: 1px solid var(--c-line); display: flex; align-items: flex-end; padding: 7px; }
  .lbl { font-size: 9.5px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--c-ink-mute); }
  .shadow { background: var(--c-bg-2); box-shadow: var(--shadow-lg); border: 0; }
</style>
</head>
<body>
  <div class="box" style="border-radius:var(--r-sm)"><span class="lbl">sm 6</span></div>
  <div class="box" style="border-radius:var(--r-md)"><span class="lbl">md 10</span></div>
  <div class="box" style="border-radius:var(--r-lg)"><span class="lbl">lg 14</span></div>
  <div class="box" style="border-radius:var(--r-card)"><span class="lbl">card 16</span></div>
  <div class="box shadow" style="border-radius:var(--r-card)"><span class="lbl">shadow-lg</span></div>
</body>
</html>
