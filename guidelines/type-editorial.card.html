<!-- @dsCard group="Type" viewport="700x210" name="Editorial accent — Instrument Serif" subtitle="Italic emphasis inside display lines" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--c-bg); color: var(--c-ink); padding: 26px; }
  .line { font-family: var(--ff-display); font-weight: 700; font-size: 46px; line-height: 1.05; letter-spacing: -0.03em; margin: 0; }
  .em { font-family: var(--ff-editor); font-style: italic; font-weight: 400; }
  .meta { font-family: var(--ff-mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--c-ink-mute); margin-top: 18px; }
</style>
</head>
<body>
  <p class="line">It is the <span class="em">operating&nbsp;layer.</span></p>
  <p class="line" style="font-size:32px; color:var(--c-ink-sub); margin-top:10px;">Old wisdom, <span class="em">new&nbsp;instruments.</span></p>
  <div class="meta">Instrument Serif / Cormorant · italic 400 · accent only</div>
</body>
</html>
