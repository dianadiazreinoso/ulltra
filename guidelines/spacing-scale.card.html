<!-- @dsCard group="Spacing" viewport="700x190" name="Spacing scale" subtitle="4px base grid · s-1 → s-12" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--c-bg); padding: 24px 26px; font-family: var(--ff-mono); }
  .stack { display: flex; flex-direction: column; gap: 7px; }
  .row { display: flex; align-items: center; gap: 12px; }
  .bar { height: 12px; background: var(--c-accent); border-radius: 2px; opacity: 0.9; }
  .lbl { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--c-ink-mute); width: 92px; flex: 0 0 auto; }
</style>
</head>
<body>
  <div class="stack">
    <div class="row"><span class="lbl">s-2 · 8</span><span class="bar" style="width:8px"></span></div>
    <div class="row"><span class="lbl">s-4 · 16</span><span class="bar" style="width:16px"></span></div>
    <div class="row"><span class="lbl">s-6 · 24</span><span class="bar" style="width:24px"></span></div>
    <div class="row"><span class="lbl">s-7 · 32</span><span class="bar" style="width:32px"></span></div>
    <div class="row"><span class="lbl">s-9 · 56</span><span class="bar" style="width:56px"></span></div>
    <div class="row"><span class="lbl">s-11 · 96</span><span class="bar" style="width:96px"></span></div>
    <div class="row"><span class="lbl">s-12 · 128</span><span class="bar" style="width:128px"></span></div>
  </div>
</body>
</html>
