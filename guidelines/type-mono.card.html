<!-- @dsCard group="Type" viewport="700x200" name="Instrument panel — JetBrains Mono" subtitle="Eyebrows · numerals · kickers, always UPPERCASE wide" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--c-bg); color: var(--c-ink); padding: 26px; font-family: var(--ff-mono); }
  .row { display: flex; align-items: baseline; gap: 14px; padding: 10px 0; border-top: 1px dashed var(--c-line-soft); }
  .row:first-child { border-top: 0; }
  .ex { text-transform: uppercase; }
  .eyebrow { font-size: 12px; letter-spacing: 0.24em; color: var(--c-ink-sub); }
  .kicker { font-size: 11px; letter-spacing: 0.14em; color: var(--c-ink-mute); }
  .num { font-size: 12px; letter-spacing: 0.12em; color: var(--c-accent); }
  .meta { margin-left: auto; font-size: 10px; letter-spacing: 0.1em; color: var(--c-ink-dim); }
</style>
</head>
<body>
  <div class="row"><span class="ex eyebrow">Index</span><span class="meta">ls 0.24em · menu eyebrow</span></div>
  <div class="row"><span class="ex kicker">Origin · Status</span><span class="meta">ls 0.14em · card kicker</span></div>
  <div class="row"><span class="ex num">01 — 08</span><span class="meta">nav numerals</span></div>
</body>
</html>
