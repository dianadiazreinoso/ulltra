<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SVRN — Sovereign AI Infrastructure</title>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--c-bg); color: var(--c-ink);
    font-family: var(--ff-display); font-size: var(--fs-body); line-height: var(--lh-body);
    -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
  }
  ::selection { background: var(--c-accent); color: #0A0807; }
  button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; }
  .container { width: var(--container); margin-inline: auto; }
</style>
</head>
<body>
  <div id="app"></div>

  <script type="text/babel" src="Header.jsx"></script>
  <script type="text/babel" src="HeroKit.jsx"></script>
  <script type="text/babel" src="CapabilitiesKit.jsx"></script>
  <script type="text/babel">
    const { useState } = React;

    function App() {
      const [menuOpen, setMenuOpen] = useState(false);
      const [drawerOpen, setDrawerOpen] = useState(false);
      return (
        <React.Fragment>
          <Header
            onMenu={() => setMenuOpen(true)}
            onGetStarted={() => setDrawerOpen(true)}
          />
          <HeroKit onGetStarted={() => setDrawerOpen(true)} />
          <CapabilitiesKit />
          <IndexMenu open={menuOpen} onClose={() => setMenuOpen(false)}
                     onGetStarted={() => { setMenuOpen(false); setTimeout(() => setDrawerOpen(true), 240); }} />
          <GetStartedDrawer open={drawerOpen} onClose={() => setDrawerOpen(false)} />
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById("app")).render(<App />);
  </script>
</body>
</html>
