<script>
  /* Empezar siempre en el hero al cargar o recargar: evita que el navegador
     restaure el scroll a mitad de página y se salte el hero animado. */
  try { if ('scrollRestoration' in history) history.scrollRestoration = 'manual'; } catch (e) {}
  window.addEventListener('load', function () { if (!location.hash) window.scrollTo(0, 0); });
  window.addEventListener('pageshow', function (e) { if (e.persisted && !location.hash) window.scrollTo(0, 0); });
</script>

.hero{

}

}

  font-size: clamp(28px, 2.9vw, 45px);

  max-width: 38ch;
  margin: 0;
  letter-spacing: 0;
}

/* ─── Info cards ──────────────────────────────────────────────────────────── */
.cards{
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap: 0;
  margin-top: clamp(40px, 6vw, 72px);
  width: 100%;
  max-width: 720px;
  border-radius: var(--r-md);
  /* Frosted-glass info cards. The fixed header (.hdr) carries NO backdrop-filter,
     so this is the only persistent backdrop blur near the top of the page; it
     re-blurs every frame while the hero scrolls. Halving the blur radius (14→8px)
     roughly halves the per-frame sample kernel; the tint is nudged a touch denser
     (.42→.50) so the frosted appearance stays effectively identical. */
  background: rgba(20,17,14,.50);
  border: 1px solid var(--c-glass-stroke);
  backdrop-filter: blur(8px) saturate(120%);
  -webkit-backdrop-filter: blur(8px) saturate(120%);
  box-shadow:
    inset 0 1px 0 rgba(237,229,204,.05),
    0 12px 32px rgba(0,0,0,.32);
  overflow: hidden;
}

}

}

  font-size: var(--fs-micro);

}
.ic-body{

  font-weight: 600;
  font-size: 14px;
  line-height: 1.25;
  color: var(--c-ink);
  display:flex; flex-wrap:wrap; align-items:center; gap: 10px;
}
.ic-body br + span{display:inline-block}
.ic-dot{
  width: 7px; height: 7px; border-radius:50%;
  background: var(--c-status);
  box-shadow: 0 0 10px 1px color-mix(in oklab, var(--c-status) 50%, transparent);
  flex: 0 0 auto;
  animation: pulse 2.4s var(--ease-in-out) infinite;
}
@keyframes pulse{
  0%,100%{opacity:1}
  50%   {opacity:.55}
}

/* ─── Scroll affordance ───────────────────────────────────────────────────── */
.hero-scroll{
  position:absolute;
  right: clamp(16px, 2vw, 30px);   /* aligned on the section-nav rail's axis */
  bottom: clamp(26px, 4vh, 52px);
  z-index: var(--z-content);
  display:flex;
  flex-direction:column;
  align-items:center;
  color: #D0FF00;                   /* anchor lime */
}
/* Animated mouse / scroll-down indicator */
.hero-mouse{
  position:relative;
  display:block;
  width: 26px;
  height: 42px;
  border: 2px solid currentColor;
  border-radius: 16px;
  opacity:.9;
}
.hero-mouse-wheel{
  position:absolute;
  left:50%; top:7px;
  width: 4px; height: 8px;
  margin-left:-2px;
  border-radius: 4px;
  background: currentColor;
  animation: heroScrollWheel 1.8s cubic-bezier(.15,.41,.69,.94) infinite;
}
@keyframes heroScrollWheel{
  0%   { opacity:0; transform: translateY(0); }
  12%  { opacity:1; }
  100% { opacity:0; transform: translateY(16px); }
}
@media (prefers-reduced-motion: reduce){
  .hero-mouse-wheel{ animation: none; }
}

.bg{
  position:absolute;
  inset:0;
  z-index: var(--z-bg);
  overflow:hidden;
}
/* Scroll-mapped frame canvas — sits at the very back of the hero stack and
   is painted imperatively by HeroFrameCanvas. Fades up on mount so the first
   frame doesn't pop in. */
.hero-canvas{
  position:absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  display:block;
  background: var(--c-bg);
  animation: bgFade 1.6s var(--ease-out-cine) both;
}
/* Scroll-scrubbed hero video — full-bleed cover, driven imperatively by
   HeroScrubVideo (currentTime mapped to scroll progress). Fades up on mount. */
.hero-video{
  position:absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: 50% 50%;
  display:block;
  background: var(--c-bg);
  pointer-events: none;
  animation: bgFade 1.6s var(--ease-out-cine) both;
}
@media (max-width: 760px) and (orientation: portrait){
  /* Bias the cover crop toward the seated figure (right-of-centre in the
     16:9 source) so it stays predominantly in frame on a narrow portrait. */
  .hero-video{ object-position: 72% center; }
}
.bg-parallax{
  position:absolute;
  inset:0;
  will-change: transform;
}
.bg-img{
  position:absolute;
  inset: -4% -4% -4% -4%;
  background-image: url("assets/8e544ddc-7974-444d-b14b-27dceb0ed187.jpg");
  background-size: cover;
  background-position: 70% 35%;
  background-repeat: no-repeat;
  filter: saturate(0.95) contrast(1.02);
  will-change: transform, opacity;
}
.bg-grad{
  position:absolute;
  inset:0;
  /* left → dramatic darkening (anchors content),
     bottom → gentle floor for card legibility,
     subtle warm color cast across whole image.
     Strengthened vs. the original because the frame sequence is brighter
     and more saturated than the original static painting. */
  background:
    radial-gradient(110% 75% at 0% 50%, rgba(10,8,7,.94) 0%, rgba(10,8,7,.65) 32%, rgba(10,8,7,0) 60%),
    linear-gradient(180deg, rgba(10,8,7,.6) 0%, rgba(10,8,7,.05) 22%, rgba(10,8,7,0) 55%, rgba(10,8,7,.7) 100%),
    linear-gradient(90deg, rgba(10,8,7,.5) 0%, rgba(10,8,7,0) 55%);
  pointer-events:none;
  animation: bgFade 1.8s var(--ease-out-cine) .15s both;
}
.bg-vignette{
  position:absolute;
  inset:0;
  background:
    radial-gradient(140% 100% at 50% 50%, rgba(0,0,0,0) 55%, rgba(0,0,0,.55) 100%);
  pointer-events:none;
  mix-blend-mode: multiply;
}
@keyframes bgFadeScale{
  from{opacity:0; transform: scale(1.08)}
  to  {opacity:1; transform: scale(1)}
}
@keyframes bgFade{
  from{opacity:0}
  to  {opacity:1}
}
.bg-img.bg-enter{
  animation: bgFadeScale 1.8s var(--ease-out-cine) both;
  transform-origin: center;
}
.bg-grad.bg-enter{
  animation: bgFade 1.4s var(--ease-out-cine) .15s both;
}

/* =============================================================================
   Positioning Section — editorial cream beat after the hero
   ========================================================================== */
.ps{
  position: relative;
  background: #F7F3E8; /* warm ivory — editorial paper */
  color: #1A1612;
  /* Full-viewport editorial canvas. min-height (not fixed height) so tall
     content on small screens can still grow past the fold instead of clipping. */
  min-height: 100vh;
  min-height: 100svh;
  display: flex;
  flex-direction: column;
  justify-content: center;   /* vertically balance the content block */
  padding-block: clamp(96px, 12vh, 168px);
  overflow: clip;
  isolation: isolate;
  scroll-snap-align: start;  /* snap destination — settles to fill the viewport */
  /* clip-path is set inline by React for the unveil; this keeps a smooth
     transition the first time it animates. */
  will-change: clip-path;
}
.ps::before,
.ps::after{
  content:"";
  position: absolute;
  inset: 0;
  pointer-events: none;
}
.ps::before{ /* paper grain */
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='220' height='220'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 .08  0 0 0 0 .06  0 0 0 0 .04  0 0 0 .9 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
  opacity: 0.05;
  mix-blend-mode: multiply;
  z-index: 1;
}
.ps::after{ /* soft inner vignette */
  background:
    radial-gradient(120% 100% at 50% 50%, rgba(247,243,232,0) 55%, rgba(36,29,20,.08) 100%);
  z-index: 1;
}
.ps-inner{
  position: relative;

  display: flex;
  flex-direction: column;
  gap: clamp(40px, 4vw, 64px);
}
.ps-eyebrow{

}

}

}
.ps-word{

  margin-block: -0.04em -0.18em;
}
.ps-word > span{
  display: inline-block;

.ps-body{

/* =============================================================================

.sx{

/* Dark shadow falling from the previous section onto the cream paper */
.sx-bleed{

/* =============================================================================
   Consultancy Section — twin statues + wordmark on cream paper
   ========================================================================== */
.cs{
  position: relative;
  background: #F7F3E8;
  color: #1A1612;
  height: 300vh;          /* scroll runway for the pinned 3-phase timeline */
  overflow: clip;
  isolation: isolate;
  scroll-snap-align: start;   /* P3 — gentle proximity settle (CSS only) */
}
.cs-sticky{
  position: sticky;
  top: 0;
  height: 100vh;
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: clamp(36px, 5vh, 70px);
  padding-block: clamp(70px, 9vh, 120px) clamp(70px, 9vh, 120px);
  padding-inline: var(--gutter);
  overflow: hidden;
}
.cs-cards-wrap{
  position: relative;
  z-index: 5;
  width: 100%;
  display: flex;
  justify-content: center;
  will-change: transform, opacity;
}
/* vignette removed — flat cream background per design request */
.cs-figure{
  position: absolute;
  bottom: 0;                         /* stuck flush to the bottom of the section */
  z-index: 3;
  pointer-events: none;
  display: block;
  height: clamp(560px, 92vh, 1100px);
  max-height: 98vh;

}

.cs-figure .pd-wrap{

}
.cs-figure .pd-wrap{

}
.cs-figure .pd-canvas{

}

  transform-origin: bottom left;
}
.cs-figure--right{

.cs-word{
  position: relative;

  font-weight: 800;
  font-size: clamp(40px, 11vw, 100px);  /* section wordmark — 100px on desktop, responsive below */
  line-height: 0.95;

@media (max-width: 1024px){
  .cs-figure{ opacity: .5 }

  .cs-figure--right{ right: -10vw }

@media (max-width: 760px){
  /* Consultancy renders a sticky, scroll-driven storytelling sequence on
     mobile: the <section> is a tall scroll runway, the .csm-stage pins to the
     viewport, and intro statues → cards are cross-faded one focus at a time.
     The desktop pinned timeline is NOT rendered at this width. */
  .cs.cs--mobile-story{
    position: relative;
    height: 380vh;
    display: block;
    padding: 0;
    overflow: clip;            /* hard guard against any horizontal scroll */
    background-color: rgb(242, 235, 212);
  }
  .csm-stage{
    position: sticky;
    top: 0;
    height: 100vh;
    height: 100svh;
    height: 100dvh;
    overflow: hidden;
    isolation: isolate;
  }

  /* ── Intro layer — twin statues dominate the viewport ──────────────────── */
  .csm-figures{
    position: absolute;
    inset: 0;
    z-index: 2;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: 0;
    overflow: visible;
    will-change: opacity;
  }
  .csm-fig{
    display: block;
    width: auto;
    height: 66.6vh;
    height: 66.6svh;
    height: 66.6dvh;
    object-fit: contain;
    object-position: bottom center;
    flex: 0 0 auto;
    filter: drop-shadow(0 24px 60px rgba(26, 22, 18, 0.18));
    will-change: transform;
  }
  /* Pull the two busts toward the centre so the facing profiles nearly touch.
     Margins in vh (figures are height-sized) so they never overlap on narrow
     phones; combined internal transparency ~11.38vh − 4.7vh×2 ≈ 2vh apart. */
  .csm-fig--l{ margin-right: -4.7vh; }
  .csm-fig--r{ margin-left:  -4.7vh; position: relative; top: 15px; }

  /* ── Headline — intro only, overlaid high over the statues ─────────────── */
  .csm-word{
    position: absolute;
    z-index: 4;
    left: 0; right: 0;
    top: calc(clamp(112px, 16vh, 140px) + 45px);
    margin: 0;
    white-space: normal;
    font-size: clamp(44px, 14vw, 72px);
    line-height: 0.94;
    letter-spacing: -0.035em;
    text-align: center;
    pointer-events: none;
    will-change: opacity, transform;
  }

  /* ── Card layer — one card at a time, centred. Non-interactive: never
        capture touch (would block scrolling). ─────────────────────────────── */
  .csm-card-slot{
    position: absolute;
    inset: 0;
    z-index: 3;
    display: grid;
    place-items: center;
    padding: clamp(150px, 25vh, 205px) var(--gutter) 0;
    pointer-events: none;
    will-change: opacity, transform;
  }
  .csm-card-slot .cs-card{
    width: min(420px, 86vw);
    max-width: 86vw;
    margin: 0;
  }
}

/* —— Consultancy cards ————————————————————————————————————————————————— */
.cs-cards{

  grid-template-columns: repeat(3, minmax(0, 1fr));

.cs-card{
  position: relative;
  display: flex;
  flex-direction: column;
  isolation: isolate;
  aspect-ratio: 400 / 360;     /* matches SVG viewBox so corners + notch don't squish */
}

/* Single SVG frame — unified header + body shape with 3px outer stroke */
.cs-card-frame{
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 0;
  display: block;
  overflow: visible;

/* Body — content over the cream band */
.cs-card-body{

.cs-card-list li{

}

/* Spec code — sits in the bottom-right notch cutout (outside the body fill) */
.cs-card-code{
  position: absolute;
  z-index: 2;
  right: clamp(14px, 1.4vw, 20px);
  bottom: clamp(12px, 1.2vw, 18px);
  font-family: var(--ff-mono, "JetBrains Mono", ui-monospace, monospace);
  font-size: clamp(11px, 0.78vw, 12px);
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: rgba(14, 11, 8, 0.7);
  will-change: opacity;
}

@media (max-width: 1024px){
  .cs-cards{
    grid-template-columns: repeat(2, minmax(0, 1fr));
    max-width: 720px;
  }
}
@media (max-width: 640px){
  .cs-cards{
    grid-template-columns: 1fr;
    max-width: 480px;
    gap: 18px;
  }
}

.ap{
  position: relative;
  background: #F2EAD3;          /* flat cream paper beneath the banner */
  color: #1a1612;
  overflow: hidden;
  isolation: isolate;
  padding-bottom: clamp(80px, 12vh, 160px);
}

/* — Software chapter: laid out identically to the Tech & AI Stack section —
     a banner at the normal clamp height with the title + subtitle centred in
     the open band (top of image → top of cards), the parallax painting/figure
     behind it, and the three cards overlapping up into the banner. The only
     differences from Stack are the background image (software landscape +
     floating figure) and the cards themselves. No single-screen hero override,
     so the full composition scrolls naturally like every other section. */
/* Desktop: give #software its own snap anchor so proximity-snap settles its
   banner top to the viewport top instead of grabbing a neighbouring section. */
@media (min-width: 861px){
  #software{ scroll-snap-align: start; scroll-margin-top: 0; }
}

#software .ap-banner{
  justify-content: center;
  padding-top: clamp(96px, 11vh, 150px);
  padding-bottom: calc(clamp(96px, 11vh, 150px) + clamp(140px, 16vh, 260px));
}
/* Darker black veil over the software landscape so the wordmark + subtitle
   read clearly against the bright painting + balloon-dog figure. */
#software .ap-veil{
  background:
    /* stronger uniform black scrim for text legibility */
    linear-gradient(rgba(0,0,0,.52), rgba(0,0,0,.52)),
    linear-gradient(180deg,
      rgba(10,8,7,.55) 0%,
      rgba(10,8,7,.30) 30%,
      rgba(10,8,7,.30) 60%,
      rgba(10,8,7,.45) 100%),
    radial-gradient(120% 80% at 50% 45%,
      rgba(10,8,7,0) 45%,
      rgba(10,8,7,.42) 100%);
}

/* — Banner: image area at the top of the section. The painting + wordmark +
     subtitle live inside this band; cards overlap into the cream paper below
     via negative margin. */
.ap-banner{
  position: relative;
  height: clamp(720px, 80vh, 1202px);  /* ~1202 at large viewports */
  overflow: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: clamp(120px, 14vh, 200px);
  padding-inline: var(--gutter);
}

/* — Painting background (parallax wrapper holds motion values) */
.ap-bg{
  position: absolute;
  inset: -10% -2% -10% -2%;
  z-index: var(--z-bg);
  will-change: transform;
}
.ap-bg-img{
  position: absolute;
  inset: 0;
  background-image: url("assets/software-landscape.webp");
  background-size: cover;
  background-position: 50% 90%;
  filter: saturate(0.97) contrast(1.03);
}

/* — Floating figure (boy on the balloon dog), parallax layer above the
     painting. Cut out to transparency; drifts faster than the landscape and
     adds a gentle idle float so the banner reads as two living depth planes. */
.ap-figure{
  position: absolute;
  z-index: 2;                /* above veil-darkened painting, behind wordmark */
  top: 50%;
  left: 50%;
  width: clamp(440px, 52vw, 920px);
  aspect-ratio: 1672 / 941;
  transform: translate(-50%, -50%);
  pointer-events: none;
  will-change: transform;
  filter: drop-shadow(0 38px 60px rgba(10,8,7,.42));
}
.ap-figure-px{
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
  will-change: transform;
}
.ap-figure-img{
  position: absolute;
  inset: 0;
  background-image: url("assets/software-figure.webp");
  background-size: contain;
  background-position: center;
  background-repeat: no-repeat;
  width: 100%; height: 100%;
  will-change: transform;
  animation: apFloat 7.5s var(--ease-in-out, ease-in-out) infinite;
}
@keyframes apFloat{
  0%,100%{ transform: translateY(0) rotate(-0.4deg); }
  50%    { transform: translateY(-16px) rotate(0.4deg); }
}
@media (prefers-reduced-motion: reduce){
  .ap-figure-img{ animation: none; }
}

.ap-veil{
  position: absolute;
  inset: 0;
  z-index: 1;
  pointer-events: none;
  background:
    /* uniform black scrim for text legibility over the landscape */
    linear-gradient(rgba(0,0,0,.34), rgba(0,0,0,.34)),
    linear-gradient(180deg,
      rgba(10,8,7,.45) 0%,
      rgba(10,8,7,.15) 28%,
      rgba(10,8,7,.10) 55%,
      rgba(10,8,7,.30) 80%,
      rgba(10,8,7,.55) 100%),
    radial-gradient(120% 80% at 50% 50%,
      rgba(10,8,7,0) 50%,
      rgba(10,8,7,.30) 100%);
}

.ap-eyebrow{
  position: absolute;
  top: clamp(40px, 6vh, 72px);
  left: 0; right: 0;
  z-index: 5;
  display: flex; justify-content: space-between;
  padding-inline: var(--gutter);
  font-family: var(--ff-mono);
  font-size: var(--fs-nav);
  letter-spacing: var(--ls-wide);
  text-transform: uppercase;
  color: rgba(237,229,204,.55);
}
.ap-eyebrow > span:first-child{
  border-left: 1px solid rgba(237,229,204,.3);
  padding-left: 12px;
}

.ap-word{
  position: relative;
  z-index: 5;
  margin: 0;
  text-align: center;
  font-family: "Archivo", ui-sans-serif, system-ui, sans-serif;
  font-weight: 800;
  font-size: clamp(40px, 11vw, 100px);  /* section wordmark — 100px on desktop, responsive below */
  line-height: 0.9;
  letter-spacing: -0.045em;
  color: var(--c-ink);
  user-select: none;
  white-space: nowrap;
  display: flex; justify-content: center; align-items: baseline; flex-wrap: nowrap;
}

.ap-subtitle{
  position: relative;
  z-index: 5;
  margin: clamp(24px, 3vh, 44px) auto 0;
  width: 100%;
  max-width: 1170px;
  text-align: center;
  font-family: "Archivo", ui-sans-serif, system-ui, sans-serif;
  font-weight: 400;
  font-size: clamp(15px, 1.15vw, 18px);
  line-height: 1.55;
  color: rgba(237,229,204,.88);
}
.ap-word-wrap{
  display: inline-block;
  overflow: clip;
  overflow-clip-margin: 0.4em;
  vertical-align: baseline;
  padding-block: 0.06em 0.2em;
  margin-block: -0.06em -0.2em;
}
.ap-word-wrap > span{
  display: inline-block;
  will-change: transform, opacity;
}

/* — Card grid — straddles the seam: top portion sits over the banner image,
     bottom portion sits over the flat cream paper. */
.ap-cards{
  position: relative;
  z-index: 10;
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: clamp(16px, 1.8vw, 28px);
  margin-top: clamp(-260px, -16vh, -140px);
}
/* Software + Tech & AI Stack card rows keep their original full width,
   overriding the narrower global --container (1480) for these two sections. */
.ap-cards.container{ width: min(1760px, 100vw - 64px); }


/* — Card */
.ac{
  --ac-ink: #EDE5CC;
  --ac-sub: rgba(237,229,204,.7);
  position: relative;
  overflow: hidden;
  border-radius: 14px;
  aspect-ratio: 481 / 652;
  isolation: isolate;
  background: #1a1612;
  color: var(--ac-ink);
  transform: translateZ(0); /* GPU layer */
}
.ac:hover{}
.ac-bg{
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  will-change: transform;
  z-index: 0;
}
.ac-veil{
  position: absolute;
  inset: 0;
  z-index: 1;
  pointer-events: none;
  /* gradient for legibility — different per card via opacity tween only */
  background: linear-gradient(180deg, rgba(0,0,0,0) 30%, rgba(0,0,0,.45) 100%);
}

/* — Per-card asset positioning */
.ac-asset{
  position: absolute;
  z-index: 2;
  pointer-events: none;
  will-change: transform;
}
.ac-asset img{display: block; width: 100%; height: auto}
.ac-asset--1{
  /* browser mock — centered, near middle */
  top: 38%;
  left: 12%;
  right: 12%;
  filter: drop-shadow(0 18px 30px rgba(0,0,0,.35));
}
.ac-asset--2{
  /* phone — slightly off-center, taller */
  top: 14%;
  left: 28%;
  right: 28%;
  filter: drop-shadow(0 30px 50px rgba(0,0,0,.45));
}

/* — Detailed card variant (text-heavy): kicker · title · italic tag ·
     paragraph · 2-column numbered items list */
.ac--detailed{ aspect-ratio: auto; }
.ac--detailed .ac-bg{
  /* Slightly darker overlay for readability of the dark text */
  filter: saturate(0.92) brightness(0.96);
}
/* Cards with dark ink (default) get a light cream veil for legibility */
.ac--detailed .ac-veil{
  background: linear-gradient(180deg, rgba(247,243,232,.55) 0%, rgba(247,243,232,.42) 100%);
  opacity: 1;
  mix-blend-mode: lighten;
}
/* Cards with cream ink (dark backgrounds) get a darker veil instead */
.ac--detailed.ac--dark .ac-veil{
  background: linear-gradient(180deg, rgba(20,30,30,.45) 0%, rgba(20,30,30,.35) 100%);
  mix-blend-mode: multiply;
}
.ac-detail{
  position: relative;
  z-index: 3;
  display: flex;
  flex-direction: column;
  padding: clamp(28px, 2.4vw, 44px);
  color: var(--ac-ink);
}
.ac-detail .ac-kicker{
  font-family: var(--ff-mono);
  font-size: var(--fs-micro);
  letter-spacing: var(--ls-wide);
  text-transform: uppercase;
  color: var(--ac-sub);
  margin: 0 0 28px;
}
.ac-detail-title{
  font-family: "Archivo", ui-sans-serif, system-ui, sans-serif;
  font-weight: 800;
  font-size: clamp(31px, 2.85vw, 45px);
  line-height: 1.0;
  letter-spacing: -0.02em;
  color: var(--ac-ink);
  margin: 0 0 18px;
}
.ac-detail-tag{
  font-family: "Cormorant", "Times New Roman", serif;
  font-style: italic;
  font-weight: 500;
  font-size: clamp(20px, 1.6vw, 26px);
  line-height: 1.22;
  /* italic tagline takes the card's brand accent (purple / lime); AOS has no
     --ac-tag so it falls back to the ink colour, unchanged. */
  color: var(--ac-tag, var(--ac-ink));
  margin: 0 0 22px;
  max-width: 30ch;
}
.ac-detail-body{
  font-family: "Archivo", ui-sans-serif, system-ui, sans-serif;
  font-weight: 400;
  font-size: clamp(13px, 1.0vw, 15px);
  line-height: 1.65;
  color: var(--ac-ink);
  margin: 0 0 32px;
}
.ac-detail-items{
  list-style: none;
  padding: 28px 0 0;
  margin: 0;
  border-top: 1px solid color-mix(in oklab, var(--ac-ink) 18%, transparent);
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px 32px;
}
.ac-detail-item{
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 14px;
  align-items: start;
}
.ac-detail-num{
  font-family: var(--ff-mono);
  font-size: var(--fs-micro);
  letter-spacing: var(--ls-wide);
  color: var(--ac-sub);
  padding-top: 3px;
}
.ac-detail-text{
  font-family: "Archivo", ui-sans-serif, system-ui, sans-serif;
  font-weight: 500;
  font-size: clamp(12px, 0.95vw, 14px);
  line-height: 1.45;
  color: var(--ac-ink);
  max-width: 22ch;
}

/* — Capability icon grid (shared icon set, recoloured per card) */
.ac-icons{
  list-style: none;
  margin: 0;
  padding: clamp(24px, 2.2vw, 34px) 0 0;
  border-top: 1px solid color-mix(in oklab, var(--ac-ink) 22%, transparent);
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: clamp(15px, 1.5vw, 22px) clamp(18px, 2vw, 36px);
}
.ac-ic-item{
  display: flex;
  align-items: center;
  gap: 12px;
  min-width: 0;
}
.ac-ic{
  flex: 0 0 auto;
  width: 22px; height: 22px;
  background-color: var(--ac-icon, var(--ac-ink));
  -webkit-mask-position: center; mask-position: center;
  -webkit-mask-repeat: no-repeat; mask-repeat: no-repeat;
  -webkit-mask-size: contain; mask-size: contain;
}
.ac-ic-label{
  font-family: "Archivo", ui-sans-serif, system-ui, sans-serif;
  font-weight: 500;
  font-size: clamp(12px, 0.95vw, 14px);
  line-height: 1.2;
  letter-spacing: -0.004em;
  color: var(--ac-icon, var(--ac-ink));
  white-space: nowrap;
}
/* Solid brand-colour cards (DataSpaces, Portal) — flat colour, no image/veil */
.ac--solid{ background: var(--ac-solid, #CB48FF); }
@media (max-width: 720px){
  .ac-icons{ grid-template-columns: 1fr; }
  .ac-ic-label{ white-space: normal; }
}

/* — Tech & AI Stack section — clones .ap with its own banner image, a slightly
     smaller wordmark (the title is longer than "Software"), and grouped tool
     lists inside the cards. */
.stk{
  /* Pulled up one viewport so it sits BEHIND the (opaque) shrinking bust stage:
     as that stage shrinks, this section's hands image rises into view from below
     — no separate copy of the image (avoids the duplicate), and its top aligns
     exactly with the viewport when the bust stage releases (seamless handoff). */
  margin-top: -114vh;
  z-index: 1;
}
.stk .ap-bg-img{
  background-image: url("assets/stack-bg.jpg");
  background-position: 50% 42%;
  filter: saturate(0.96) contrast(1.03);
}
/* Center the title + subtitle group in the OPEN band (top of image → top of
   cards) rather than top-aligning it. The cards climb 16vh into the banner via
   negative margin, so the bottom padding exceeds the top padding by that 16vh —
   this shifts the flex-centered group up by half the overlap so it lands at the
   true midpoint of the visible band. */
.stk .ap-banner{
  justify-content: center;
  padding-top: clamp(96px, 11vh, 150px);
  padding-bottom: calc(clamp(96px, 11vh, 150px) + clamp(140px, 16vh, 260px));
}
.stk .ap-word{
  font-size: clamp(40px, 11vw, 100px);  /* section wordmark — 100px on desktop, responsive below */
  letter-spacing: -0.04em;
}
/* Grouped tool lists (label + items) replace the numbered 2-col grid */
.ac-groups{
  padding: clamp(20px, 1.8vw, 30px) 0 0;
  margin: 0;
  border-top: 1px solid color-mix(in oklab, var(--ac-ink) 18%, transparent);
  display: flex;
  flex-direction: column;
  gap: clamp(20px, 2vw, 30px);
}
.ac-group{
  display: grid;
  grid-template-columns: minmax(120px, 0.85fr) 1.15fr;
  gap: 14px 24px;
  align-items: start;
}
.ac-group + .ac-group{
  border-top: 1px solid color-mix(in oklab, var(--ac-ink) 15%, transparent);
  padding-top: clamp(16px, 1.6vw, 24px);
}
.ac-group-label{
  font-family: var(--ff-mono);
  font-size: var(--fs-micro);
  letter-spacing: var(--ls-wide);
  text-transform: uppercase;
  color: var(--ac-sub);
  padding-top: 4px;
}
.ac-group-items{
  list-style: none;
  margin: 0;
  padding: 0;
  display: flex;
  flex-direction: column;
  gap: 11px;
}
.ac-group-item{
  display: flex;
  align-items: center;
  gap: 11px;
  font-family: "Archivo", ui-sans-serif, system-ui, sans-serif;
  font-weight: 500;
  font-size: clamp(13px, 1.0vw, 15px);
  line-height: 1.3;
  color: var(--ac-ink);
}
.ac-group-item .ac-ic{ width: 20px; height: 20px; }
.ac-group-item, .ac-group-item *{
  cursor: default;
  user-select: none;
}

/* — Card footer text */
.ac-foot{
  position: absolute;
  z-index: 3;
  inset: auto 22px 22px 22px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  text-align: center;
  align-items: center;
  will-change: transform;
}
.ac-kicker{
  font-family: var(--ff-mono);
  font-size: var(--fs-micro);
  letter-spacing: var(--ls-wide);
  text-transform: uppercase;
  color: var(--ac-sub);
  margin-bottom: 4px;
}
.ac-title{
  font-family: var(--ff-display);
  font-weight: 700;
  font-size: clamp(20px, 1.8vw, 28px);
  line-height: 1.1;
  letter-spacing: -0.015em;
  color: var(--ac-ink);
  margin: 0;
}
.ac-tag{
  font-family: "Cormorant", "Times New Roman", serif;
  font-style: italic;
  font-weight: 500;
  font-size: clamp(15px, 1.1vw, 18px);
  line-height: 1.25;
  color: var(--ac-sub);
  margin: 0;
  max-width: 30ch;
}

/* ─── Responsive ───────────────────────────────────────────────────────────── */
@media (max-width: 1280px){
  .hdr-nav{gap: clamp(12px, 2vw, 28px)}
  .hero-content{max-width: 900px}
}
@media (max-width: 1024px){
  .hdr-nav .navitem-n{display:none}
  .navitem{gap:0}
  .cards{grid-template-columns: 1fr 1fr}
  .hero-content{max-width: 720px}
  .sys-grid{grid-template-columns: 1fr}
  .sys-block{border-right: 0}
  .ts-inner{grid-template-columns: 1fr; gap: 32px}
  .ts-para{max-width: 36ch}
  .ap-cards{grid-template-columns: repeat(2, 1fr)}
  .ap-cards .ac:nth-child(3){grid-column: 1 / -1; max-width: 60%; justify-self: center}
}
@media (max-width: 760px){
  .hdr-nav{display:none}
  .hdr-inner{grid-template-columns: auto auto}
  /* Hero runway on mobile: keep it to a clean 2-screen height. The content is
     held visible almost to the very end (see Hero component) so there is never
     an empty stretch of the painting's dark final frame before Positioning —
     which previously read as a long black gap and broke the section snapping. */
  /* ── Hero · mobile full-bleed ───────────────────────────────────────────
     The scrubbed video covers the whole hero (height = 100svh via .hero-sticky)
     with the text overlaid on top. A narrow portrait cover crop only reveals a
     vertical slice of the 16:9 footage, so we push object-position toward the
     seated figure (right-of-centre) — the sea/mountains on the left crop away
     but the figure + columns stay predominantly in frame. Text sits low over
     the bottom/left darkening so it reads without hiding the character. */
  .hero{ height: 200vh; }
  .hero-video{
    object-fit: cover;
    object-position: 85% center;
  }
  .hero-stage{
    justify-content: flex-end;
    padding-top: clamp(96px, 22vw, 150px);
    padding-bottom: clamp(40px, 13vw, 84px);
  }
  .hero-content{max-width: 100%; width: 100% !important; transform: none}
  .hero-h1{line-height: 1.02}
  .cards{grid-template-columns: 1fr}
  .hero-scroll{display:none}
  .bg-img{background-position: 65% 30%}
  .bg-grad{
    /* dark from the bottom (text) + from the left, leaving the right (figure) clearer */
    background:
      linear-gradient(180deg, rgba(10,8,7,.5) 0%, rgba(10,8,7,0) 26%, rgba(10,8,7,0) 52%, rgba(10,8,7,.88) 100%),
      radial-gradient(125% 90% at 0% 65%, rgba(10,8,7,.82) 0%, rgba(10,8,7,0) 58%);
  }
  .ts{padding-block: clamp(80px, 12vh, 140px)}
  .ts-para{font-size: clamp(24px, 6.5vw, 32px); max-width: 100%}
  .ts-dropcap{font-size: 2.2em}
  .ap-cards{grid-template-columns: 1fr; gap: 16px}
  .ap-cards .ac:nth-child(3){max-width: 100%}
  .ap-word{font-size: clamp(40px, 13vw, 100px)}
}

/* ── Software · mobile "stacked sticky cards" ──────────────────────────────────
   The hero banner pins as a fixed 415px layer behind the cards; the three
   product cards break out of the grid into normal flow and each pin at a
   progressively larger top offset with a rising z-index — so card 2 mounts
   over card 1 and card 3 over card 2, leaving a ~20px strip of each previous
   card peeking (a premium Apple-style stack). The first card starts with a
   negative margin so it visibly invades the bottom of the hero. */
@media (max-width: 760px){
  /* sticky descendants need a non-clipping section (.ap sets overflow:hidden) */
  #software{ overflow: visible; }

  #software .ap-banner{
    position: sticky;
    top: 0;
    height: 415px;
    min-height: 415px;
    padding-top: 0;
    padding-bottom: 0;
    justify-content: center;
    z-index: 1;                 /* hero sits BEHIND the card stack */
  }

  /* card column breaks out of the grid and stacks in normal flow */
  #software .ap-cards.container{
    position: relative;
    z-index: 10;                /* whole stack above the hero */
    display: block;
    width: calc(100vw - 24px);
    margin-top: -55px;          /* first card starts at the pin point (415 − 360) without a jump */
    padding-bottom: 70vh;       /* scroll runway so the last card stays pinned covering the previous */
  }

  #software .ap-cards .ac{
    position: sticky;
    top: 360px;                 /* below the banner content (title + description) so cards stack under them */
    display: block;
    width: 100%;
    height: auto;
    margin: 0 0 14px;
    border-radius: 32px;
    overflow: hidden;
    box-shadow: none;
  }
  /* iOS/Safari clip-bug fix: the AOS card's background-image + veil layers carry
     their own compositing layer (will-change:transform) and bleed past the
     parent's rounded corners, squaring the top edge. Rounding the layers
     themselves to the same radius keeps every corner clipped. */
  #software .ap-cards .ac .ac-bg,
  #software .ap-cards .ac .ac-veil{
    border-radius: inherit;
  }
  #software .ap-cards .ac:last-child{ margin-bottom: 0; }

  /* All cards pin at the same point with rising z-index, so each one fully
     covers the previous (no peeking strip from the card behind). */
  #software .ap-cards .ac:nth-child(1){ z-index: 11; }
  #software .ap-cards .ac:nth-child(2){ z-index: 12; }
  #software .ap-cards .ac:nth-child(3){ z-index: 13; }

  /* Compactar el interior para que la card entera quepa en pantalla */
  #software .ac-detail{ padding: 22px 20px 24px; }
  #software .ac-detail-title{ font-size: 30px; margin-bottom: 10px; }

<script>

  .reveal{

    // Remove the boot poster once React has actually mounted the hero. Plain

    (function () {
      var app = document.getElementById("app");
      var poster = document.getElementById("boot-poster");
      if (!app || !poster) return;
      function dismiss() {
        poster.classList.add("is-ready");
        setTimeout(function () { poster.remove(); }, 1000);
      }
      function check() {
        if (app.childElementCount > 0) {

          if (check()) mo.disconnect();
